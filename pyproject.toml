[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "forgelm"
version = "0.1.0"
description = "ForgeLM: Config-driven LLM fine-tuning toolkit with LoRA/QLoRA and TRL SFTTrainer."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "ForgeLM Contributors" }]

dependencies = [
  "torch>=2.0.0,<3.0.0",
  "transformers>=4.38.0,<5.0.0",
  "peft>=0.9.0,<1.0.0",
  "datasets>=2.17.0,<3.0.0",
  "accelerate>=0.27.0,<2.0.0",
  "pyyaml>=6.0.1,<7.0.0",
  "pydantic>=2.0.0,<3.0.0",
  "trl>=0.12.0,<2.0.0",
  "tensorboard>=2.15.0,<3.0.0",
  "huggingface_hub>=0.20.0,<1.0.0",
  "requests>=2.31.0,<3.0.0",
]

[project.optional-dependencies]
# QLoRA/bitsandbytes is effectively Linux-only for most setups.
qlora = [
  "bitsandbytes>=0.42.0,<1.0.0; sys_platform == 'linux'",
]

unsloth = [
  "unsloth>=2024.3.0; sys_platform == 'linux'",
]

# Phase 2 benchmarking; keep optional to avoid dependency bloat.
eval = [
  "lm-eval>=0.4.4,<1.0.0",
]

tracking = [
  "wandb>=0.16.0",
]

distributed = [
  "deepspeed>=0.14.0",
]

dev = [
  "pytest>=8.0.0",
  "pytest-cov>=5.0.0",
  "ruff>=0.4.0",
]

[project.scripts]
forgelm = "forgelm.cli:main"

[tool.setuptools]
package-dir = {"" = "."}

[tool.setuptools.packages.find]
where = ["."]
include = ["forgelm*"]
