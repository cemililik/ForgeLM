sonar.projectKey=cemililik_ForgeLM
sonar.organization=cemililik

# Sources analysed for code quality + security.
sonar.sources=forgelm,site,tools,.github/workflows
sonar.tests=tests
sonar.python.version=3.10,3.11,3.12,3.13

# The static site repeats its navbar / footer chrome verbatim across each
# top-level HTML file (we have no template engine — the "no build step"
# guarantee is part of the product). Sonar's duplication detector legitimately
# flags ~30 lines of shared chrome per page; that is structural, not a
# refactor target. Excluding HTML from duplication keeps the metric meaningful
# for code that *should* be refactored on duplication signal.
sonar.cpd.exclusions=site/**/*.html,site/js/translations.js,site/js/usermanuals/**

# Generated user-manual data files are produced from docs/usermanuals/ at
# deploy time and are not committed. Local builds may produce them; treat
# them as build artifacts.
sonar.exclusions=site/js/usermanuals/**
