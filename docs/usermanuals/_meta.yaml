# ForgeLM user-manual structure.
#
# This file defines the navigation tree for the user guide on the website.
# Source content lives under docs/usermanuals/<lang>/<section-id>/<page-id>.md
# and is compiled by tools/build_usermanuals.py into site/js/usermanuals/<lang>.js.
#
# `id` values must be lowercase, kebab-case, ASCII — they form URL fragments
# and filesystem paths.
#
# Page titles must exist for every supported language (en, tr, de, fr, es, zh).
# If a page's source markdown is missing for a language at build time, the
# English source is used as a fallback and the generated record is marked
# `fallback: true` so the site can show a "translation pending" banner.

languages: [en, tr, de, fr, es, zh]
default_language: en

