# ForgeLM Configuration Template
---
model:
  name_or_path: "meta-llama/Llama-2-7b-hf"
  max_length: 2048
  load_in_4bit: true
  backend: "transformers" # Can be "transformers" or "unsloth"

lora:
  r: 8
  alpha: 16
  dropout: 0.1
  bias: "none"
  use_dora: false
  target_modules: 
    - "q_proj"
    - "v_proj"
  task_type: "CAUSAL_LM"

training:
  output_dir: "./checkpoints"
  final_model_dir: "final_model"
  merge_adapters: false
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 2
  learning_rate: 2.0e-5
  warmup_ratio: 0.1
  weight_decay: 0.01
  eval_steps: 200
  save_steps: 200
  save_total_limit: 3
  packing: false

data:
  dataset_name_or_path: "your_dataset_here"
  shuffle: true
  clean_text: true
  add_eos: true

