# ForgeLM Configuration Template
---
model:
  name_or_path: "meta-llama/Llama-2-7b-hf"
  max_length: 2048
  load_in_4bit: true
  backend: "transformers" # Can be "transformers" or "unsloth"
  trust_remote_code: false # Security: set true only for models that require custom code
  # offline: false  # Air-gapped mode: no HF Hub calls, models/datasets must be local
  # Optional advanced bitsandbytes knobs (Transformers backend + 4bit):
  # bnb_4bit_use_double_quant: true
  # bnb_4bit_quant_type: "nf4"
  # bnb_4bit_compute_dtype: "auto"   # auto|bfloat16|float16|float32

lora:
  r: 8
  alpha: 16
  dropout: 0.1
  bias: "none"
  use_dora: false
  target_modules: 
    - "q_proj"
    - "v_proj"
  task_type: "CAUSAL_LM"

training:
  output_dir: "./checkpoints"
  final_model_dir: "final_model"
  merge_adapters: false
  trainer_type: "sft"  # "sft" for supervised fine-tuning, "orpo" for preference alignment
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 2
  learning_rate: 2.0e-5
  warmup_ratio: 0.1
  weight_decay: 0.01
  eval_steps: 200
  save_steps: 200
  save_total_limit: 3
  packing: false
  # orpo_beta: 0.1       # ORPO odds ratio weight (only when trainer_type: "orpo")
  # report_to: "tensorboard"  # "tensorboard", "wandb", "mlflow", or "none"
  # run_name: "my_experiment"  # W&B/MLflow run name; auto-generated if omitted

data:
  dataset_name_or_path: "your_dataset_here"
  # extra_datasets:        # Additional datasets to mix in
  #   - "org/extra_dataset_1"
  #   - "/path/to/local.jsonl"
  # mix_ratio: [0.7, 0.2, 0.1]  # Weight per dataset; uniform if omitted
  shuffle: true
  clean_text: true
  add_eos: true

# Distributed training (multi-GPU). Requires: pip install forgelm[distributed]
# Launch with: torchrun --nproc_per_node=N forgelm --config my_config.yaml
# distributed:
#   strategy: "deepspeed"           # "deepspeed" or "fsdp"
#   deepspeed_config: "zero2"       # preset: "zero2", "zero3", "zero3_offload" or path to JSON
#   # --- FSDP options (when strategy: "fsdp") ---
#   # fsdp_strategy: "full_shard"   # "full_shard", "shard_grad_op", "no_shard", "hybrid_shard"
#   # fsdp_auto_wrap: true
#   # fsdp_offload: false

# Authentication can be provided via HUGGINGFACE_TOKEN env var,
# an interactive prompt, or hardcoded here (not recommended).
# auth:
#   hf_token: "hf_your_token_here"

# evaluation:
#   auto_revert: true
#   max_acceptable_loss: 0.8  # If final eval_loss is higher, reverts adapters
#   # baseline_loss: 0.75     # Optional; if omitted, computed pre-training when validation exists
#   benchmark:
#     enabled: true
#     tasks:
#       - "arc_easy"
#       - "hellaswag"
#     # num_fewshot: 5        # Few-shot examples (task default if omitted)
#     # batch_size: "auto"    # "auto" or integer
#     # limit: 100            # Limit samples per task (useful for quick checks)
#     # min_score: 0.4        # Minimum average accuracy; triggers revert if below

# webhook:
