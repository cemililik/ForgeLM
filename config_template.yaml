# ForgeLM Configuration Template
---
model:
  name_or_path: "meta-llama/Llama-3.1-8B-Instruct"
  max_length: 2048
  load_in_4bit: true
  backend: "transformers" # Can be "transformers" or "unsloth"
  trust_remote_code: false # Security: set true only for models that require custom code
  # offline: false  # Air-gapped mode: no HF Hub calls, models/datasets must be local
  # Optional advanced bitsandbytes knobs (Transformers backend + 4bit):
  # bnb_4bit_use_double_quant: true
  # bnb_4bit_quant_type: "nf4"
  # bnb_4bit_compute_dtype: "auto"   # auto|bfloat16|float16|float32

lora:
  r: 8
  alpha: 16
  dropout: 0.1
  bias: "none"
  use_dora: false
  target_modules: 
    - "q_proj"
    - "v_proj"
  task_type: "CAUSAL_LM"

training:
  output_dir: "./checkpoints"
  final_model_dir: "final_model"
  merge_adapters: false
  trainer_type: "sft"  # "sft", "dpo", "simpo", "kto", "orpo", "grpo"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 2
  learning_rate: 2.0e-5
  warmup_ratio: 0.1
  weight_decay: 0.01
  eval_steps: 200
  save_steps: 200
  save_total_limit: 3
  packing: false
  # --- Alignment trainer parameters (used by respective trainer_type) ---
  # dpo_beta: 0.1           # DPO temperature
  # simpo_gamma: 0.5        # SimPO margin term
  # simpo_beta: 2.0         # SimPO scaling
  # kto_beta: 0.1           # KTO loss parameter
  # orpo_beta: 0.1          # ORPO odds ratio weight
  # grpo_num_generations: 4 # GRPO: responses per prompt
  # grpo_max_completion_length: 512  # legacy alias `grpo_max_new_tokens` still accepted
  # grpo_reward_model: "org/reward-model"  # GRPO: reward model for scoring
  # report_to: "tensorboard"  # "tensorboard", "wandb", "mlflow", or "none"
  # run_name: "my_experiment"  # W&B/MLflow run name; auto-generated if omitted
  # gpu_cost_per_hour: 3.50    # $/hour for GPU; omit to auto-detect from known GPUs

data:
  dataset_name_or_path: "your_dataset_here"
  # extra_datasets:        # Additional datasets to mix in
  #   - "org/extra_dataset_1"
  #   - "/path/to/local.jsonl"
  # mix_ratio: [0.7, 0.2, 0.1]  # Weight per dataset; uniform if omitted
  shuffle: true
  clean_text: true
  add_eos: true

# Advanced PEFT method (default: "lora")
# lora:
#   method: "pissa"   # "lora", "dora", "pissa", "rslora"
#   use_rslora: true   # rank-stabilized LoRA for high ranks (r>64)

# Long-context optimizations (for training on >4K token sequences)
# training:
#   rope_scaling:                        # RoPE positional encoding extension
#     type: "linear"                     # "linear", "dynamic", "yarn", "longrope"
#     factor: 4.0                        # Context length multiplier (4.0 = 4x original)
#   neftune_noise_alpha: 5.0             # NEFTune: add noise to embeddings (improves quality)
#   sliding_window_attention: 4096       # Override model's sliding window (e.g. Mistral)
#   sample_packing: true                 # Pack multiple short sequences into one

# Synthetic data generation (teacher→student distillation)
# Generate training data from a larger teacher model.
# Run with: forgelm --config config.yaml --generate-data
# synthetic:
#   enabled: true
#   teacher_model: "gpt-4"                 # API model name or HF model path
#   teacher_backend: "api"                 # "api", "local", "file"
#   api_base: "https://api.openai.com/v1"  # OpenAI-compatible endpoint
#   api_key_env: "OPENAI_API_KEY"          # env var for API key
#   seed_file: "prompts.txt"              # one prompt per line, or JSONL
#   system_prompt: "You are a helpful assistant."
#   max_new_tokens: 1024
#   temperature: 0.7
#   output_file: "synthetic_data.jsonl"
#   output_format: "messages"              # "messages", "instruction", "chatml"

# GaLore — optimizer-level memory optimization (alternative to LoRA)
# Enables full-parameter training with low-rank gradient projection.
# Requires: pip install galore-torch
# training:
#   galore_enabled: true
#   galore_optim: "galore_adamw"         # or galore_adamw_8bit, galore_adafactor, + _layerwise
#   galore_rank: 128                     # gradient projection rank (lower = less memory)
#   galore_update_proj_gap: 200          # steps between SVD re-computations
#   galore_scale: 0.25                   # gradient scaling factor
#   galore_proj_type: "std"              # "std", "reverse_std", "right", "left", "full"
#   galore_target_modules: null          # null = auto [".*.attn.*", ".*.mlp.*"]

# OOM Recovery — auto-reduce batch size on CUDA out-of-memory errors
# training:
#   oom_recovery: true              # enable automatic OOM recovery (default: false)
#   oom_recovery_min_batch_size: 1  # minimum batch size before giving up (default: 1)

# MoE-specific settings (for Mixture of Experts models like Qwen3, Mixtral)
# model:
#   moe:
#     quantize_experts: true     # quantize inactive experts for VRAM savings
#     experts_to_train: "all"    # "all" or comma-separated expert indices

# Model merging (post-training). Run with: forgelm --config config.yaml --merge
