# ForgeLM Configuration Template
---
model:
  name_or_path: "meta-llama/Llama-3.1-8B-Instruct"
  max_length: 2048
  load_in_4bit: true
  backend: "transformers" # Can be "transformers" or "unsloth"
  trust_remote_code: false # Security: set true only for models that require custom code
  # offline: false  # Air-gapped mode: no HF Hub calls, models/datasets must be local
  # Optional advanced bitsandbytes knobs (Transformers backend + 4bit):
  # bnb_4bit_use_double_quant: true
  # bnb_4bit_quant_type: "nf4"
  # bnb_4bit_compute_dtype: "auto"   # auto|bfloat16|float16|float32

lora:
  r: 8
  alpha: 16
  dropout: 0.1
  bias: "none"
  use_dora: false
  target_modules: 
    - "q_proj"
    - "v_proj"
  task_type: "CAUSAL_LM"

training:
  output_dir: "./checkpoints"
  final_model_dir: "final_model"
  merge_adapters: false
  trainer_type: "sft"  # "sft", "dpo", "simpo", "kto", "orpo", "grpo"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 2
  learning_rate: 2.0e-5
  warmup_ratio: 0.1
  weight_decay: 0.01
  eval_steps: 200
  save_steps: 200
  save_total_limit: 3
  packing: false
  # --- Alignment trainer parameters (used by respective trainer_type) ---
  # dpo_beta: 0.1           # DPO temperature
  # simpo_gamma: 0.5        # SimPO margin term
  # simpo_beta: 2.0         # SimPO scaling
  # kto_beta: 0.1           # KTO loss parameter
  # orpo_beta: 0.1          # ORPO odds ratio weight
  # grpo_num_generations: 4 # GRPO: responses per prompt
  # grpo_max_new_tokens: 512
  # grpo_reward_model: "org/reward-model"  # GRPO: reward model for scoring
  # report_to: "tensorboard"  # "tensorboard", "wandb", "mlflow", or "none"
  # run_name: "my_experiment"  # W&B/MLflow run name; auto-generated if omitted

data:
  dataset_name_or_path: "your_dataset_here"
  # extra_datasets:        # Additional datasets to mix in
  #   - "org/extra_dataset_1"
  #   - "/path/to/local.jsonl"
  # mix_ratio: [0.7, 0.2, 0.1]  # Weight per dataset; uniform if omitted
  shuffle: true
  clean_text: true
  add_eos: true

# Advanced PEFT method (default: "lora")
# lora:
#   method: "pissa"   # "lora", "dora", "pissa", "rslora"
#   use_rslora: true   # rank-stabilized LoRA for high ranks (r>64)

# MoE-specific settings (for Mixture of Experts models like Qwen3, Mixtral)
# model:
#   moe:
#     quantize_experts: true     # quantize inactive experts for VRAM savings
#     experts_to_train: "all"    # "all" or comma-separated expert indices

# Model merging (post-training). Run with: forgelm --config config.yaml --merge
# merge:
#   enabled: true
#   method: "ties"              # "ties", "dare", "slerp", "linear"
#   models:
#     - path: "./checkpoints/run1/final_model"
#       weight: 0.7
#     - path: "./checkpoints/run2/final_model"
#       weight: 0.3
#   output_dir: "./merged_model"

# Distributed training (multi-GPU). Requires: pip install forgelm[distributed]
# Launch with: torchrun --nproc_per_node=N forgelm --config my_config.yaml
