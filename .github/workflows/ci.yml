name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package (dev)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Smoke checks
        run: |
          forgelm --version
          forgelm --config config_template.yaml --dry-run
          python -c "from forgelm.config import load_config; load_config('config_template.yaml'); print('config ok')"

      - name: Ruff
        run: |
          ruff --version
          # Catch syntax errors, undefined names, and unused imports.
          ruff check . --select F,E9

      - name: Pytest with coverage
        run: |
          pytest -q --tb=short --cov=forgelm --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Config template validation
        run: |
          python -c "
          from forgelm.config import load_config
          cfg = load_config('config_template.yaml')
          assert cfg.model.name_or_path, 'model.name_or_path is empty'
          assert cfg.model.trust_remote_code is False, 'trust_remote_code should default to False'
          assert cfg.data.dataset_name_or_path, 'data.dataset_name_or_path is empty'
          print('Config template validation passed.')
          "
