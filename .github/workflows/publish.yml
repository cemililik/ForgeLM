name: Publish to PyPI

on:
  release:
    types: [published]

# Default to read-only at workflow level; only the publish jobs declare id-token write.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify package
        run: |
          pip install twine
          twine check dist/*

      - uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/

  # TestPyPI: triggered by pre-release tags (e.g., v0.3.0-rc1, v0.3.0-beta)
  # or releases created from test/development branches
  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    if: github.event.release.prerelease == true
    environment:
      name: testpypi
      url: https://test.pypi.org/p/forgelm
    permissions:
      id-token: write  # Required for trusted publishing to TestPyPI
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # PyPI: triggered by stable releases (non-prerelease) from main
  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    if: github.event.release.prerelease == false
    environment:
      name: pypi
      url: https://pypi.org/p/forgelm
    permissions:
      id-token: write  # Required for trusted publishing to PyPI
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
