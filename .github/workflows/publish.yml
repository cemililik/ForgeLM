name: Release - Build, cross-OS validate, publish to PyPI

# Tag-driven release pipeline. A pushed v* tag fans out into:
#   build -> cross-os-tests (3 OS x 4 Python = 12) -> publish
# Any matrix combo failure breaks the needs: chain so PyPI publish does
# not run unless every supported (OS, Python) pair installs the packaged
# wheel cleanly and runs the test suite green.

on:
  push:
    tags: ['v*']

# No workflow-level permissions; each job declares the minimum it needs.

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # checkout reads the tagged ref
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build wheel + sdist
        run: python -m build  # outputs dist/*.whl and dist/*.tar.gz

      - name: Verify package metadata
        run: |
          python -m pip install twine
          twine check dist/*

      - uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/

  cross-os-tests:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ['3.10', '3.11', '3.12', '3.13']
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read  # checkout reads the tagged ref for tests/ + tools/
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist

      - name: Install packaged wheel (NOT editable)
        shell: bash  # POSIX shell on Windows runners too
        run: |
          # Install exactly what PyPI users will pip install. Transitive
          # dependencies resolve from PyPI; the local dist/ only contains
          # the forgelm wheel, not its dependency closure (so no
          # --no-index --find-links here).
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl

      - name: Install Linux-only extras (qlora, ingestion, eval)
        if: runner.os == 'Linux'
        shell: bash
        # qlora pulls bitsandbytes which only ships Linux wheels.
        # ingestion + eval are cross-platform but bundled here so a single
        # conditional install covers the breadth-test surface on Linux.
        run: python -m pip install 'forgelm[qlora,ingestion,eval]'

      - name: Install pytest
        shell: bash
        run: python -m pip install pytest pytest-cov

      - name: Verify --ignore target exists
        shell: bash
        # Guard against silent rename: if test_cost_estimation.py is renamed
        # or removed without updating the --ignore flag below, the publish
        # would silently start running it (or no-op the ignore). Fail fast.
        run: test -f tests/test_cost_estimation.py

      - name: Test (CPU-only, no-network)
        shell: bash
        # test_cost_estimation is excluded per Faz 31 closure plan: it
        # depends on a snapshot pricing fixture that drifts on a different
        # cadence than the release matrix.
        run: pytest tests/ -q --ignore=tests/test_cost_estimation.py

      - name: Generate SBOM (CycloneDX 1.5)
        shell: bash
        run: python tools/generate_sbom.py > sbom-${{ matrix.os }}-py${{ matrix.python }}.json

      - uses: actions/upload-artifact@v5
        with:
          name: sbom-${{ matrix.os }}-py${{ matrix.python }}
          path: sbom-${{ matrix.os }}-py${{ matrix.python }}.json

  publish:
    needs: cross-os-tests  # blocked until every matrix combo is green
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/forgelm
    permissions:
      contents: read       # download-artifact reads workflow run state
      id-token: write      # OIDC trusted publishing to PyPI
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
